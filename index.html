<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLAN ÖRNEĞİ VE TEKNİK BELGE TALEPLERİ GÖREVLENDİRME</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">

    <div class="max-w-4xl mx-auto">
        <h1 class="text-2xl font-bold text-gray-800 mb-6">PLAN ÖRNEĞİ VE TEKNİK BELGE TALEPLERİ GÖREVLENDİRME</h1>

        <div class="bg-white p-6 rounded-lg shadow-md mb-6">
            <h2 class="text-lg font-semibold mb-4">Personel Yönetimi</h2>
            <div class="flex gap-2 mb-4">
                <input type="text" id="yeni-personel" placeholder="Yeni Personel Adı" class="border p-2 rounded flex-grow">
                <button onclick="personelEkle()" class="bg-blue-600 text-white px-4 py-2 rounded">Ekle</button>
            </div>
            <div id="yonetim-list" class="max-h-40 overflow-y-auto border-t pt-2 space-y-1">
                <!-- Tüm personeller burada listelenir -->
            </div>
            <p id="status" class="mt-4 text-sm text-gray-500"></p>
        </div>

        <div class="bg-white p-6 rounded-lg shadow-md mb-6">
            <h2 class="text-lg font-semibold mb-4">Genel İstatistikler</h2>
            <div id="stats-container" class="grid grid-cols-2 md:grid-cols-4 gap-4 text-sm"></div>
        </div>

        <div class="bg-white p-6 rounded-lg shadow-md">
            <h2 class="text-lg font-semibold mb-4">Günlük İş Girişi (<span id="tarih-baslik"></span>)</h2>
            <div id="personel-list" class="space-y-4"></div>
        </div>
    </div>

    <script>
        const token = "ghp_" + "1Im4128x" + "UP1uC8Oo" + "v8yBd7oahk" + "2S6a0aGBTj";
        const REPO = "gokhangeo/teknikbelge";
        const PATH = "personeller.json";
        let personeller = [], veriler = {}, sha = "";
        const tarih = new Date().toISOString().split('T')[0];
        document.getElementById('tarih-baslik').innerText = tarih;

        function utf8_to_b64(str) { return btoa(unescape(encodeURIComponent(str))); }
        function b64_to_utf8(str) { return decodeURIComponent(escape(atob(str))); }

        async function init() {
            try {
                const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${PATH}`, { headers: { 'Authorization': `token ${token}` }});
                const data = await res.json();
                personeller = JSON.parse(b64_to_utf8(data.content));
                sha = data.sha;
            } catch {
                personeller = ["AHMET ÇELİK", "AYŞE ÇAKICI PEKÇETİN"];
                await depoyaKaydet();
            }
            veriler = JSON.parse(localStorage.getItem('isTakip_' + tarih)) || {};
            personeller.forEach(p => { if (veriler[p] === undefined) veriler[p] = 0; });
            guncelle();
        }

        function guncelle() {
            localStorage.setItem('isTakip_' + tarih, JSON.stringify(veriler));
            const container = document.getElementById('personel-list');
            const yonetimContainer = document.getElementById('yonetim-list');
            const stats = document.getElementById('stats-container');
            
            container.innerHTML = ''; yonetimContainer.innerHTML = ''; stats.innerHTML = '';
            
            personeller.forEach(p => {
                container.innerHTML += `<div class="flex items-center justify-between border-b pb-2">
                    <span class="font-medium">${p}</span>
                    <input type="number" min="0" value="${veriler[p]}" class="w-20 p-2 border rounded text-center" onchange="veriler['${p}'] = parseInt(this.value) || 0; guncelle();">
                </div>`;
                
                yonetimContainer.innerHTML += `<div class="flex justify-between items-center bg-gray-50 p-2 rounded">
                    <span>${p}</span>
                    <button onclick="personelSil('${p}')" class="text-red-600 text-xs font-bold underline">Sil</button>
                </div>`;

                stats.innerHTML += `<div class="bg-blue-50 p-2 rounded text-center"><span class="block text-[10px] uppercase">${p}</span><span class="font-bold">${veriler[p]}</span></div>`;
            });
        }

        async function personelEkle() {
            const isim = document.getElementById('yeni-personel').value.toUpperCase();
            if(!isim || personeller.includes(isim)) return;
            personeller.push(isim); veriler[isim] = 0;
            await depoyaKaydet(); guncelle();
            document.getElementById('yeni-personel').value = '';
        }

        async function personelSil(isim) {
            personeller = personeller.filter(p => p !== isim); delete veriler[isim];
            await depoyaKaydet(); guncelle();
        }

        async function depoyaKaydet() {
            const body = { message: "Personel güncellendi", content: utf8_to_b64(JSON.stringify(personeller)), sha: sha };
            const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${PATH}`, {
                method: 'PUT', headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            const data = await res.json(); sha = data.content.sha;
            document.getElementById('status').innerText = "Personel listesi güncellendi.";
        }

        init();
    </script>
</body>
</html>
