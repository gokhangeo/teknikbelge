<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLAN ÖRNEĞİ VE TEKNİK BELGE TALEPLERİ GÖREVLENDİRME</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">

    <div class="max-w-6xl mx-auto p-4 md:p-6">
        <!-- Başlık Bölümü -->
        <header class="mb-8 flex flex-col md:flex-row md:items-center md:justify-between gap-4 border-b pb-6">
            <div>
                <h1 class="text-2xl md:text-3xl font-extrabold text-slate-900 tracking-tight">PLAN ÖRNEĞİ VE TEKNİK BELGE TALEPLERİ GÖREVLENDİRME</h1>
                <p class="text-slate-500 mt-1">Günlük personel iş dağılımı, takip ve arşivleme paneli</p>
            </div>
            <!-- Otomatik Kayıt Durumu Göstergesi -->
            <div class="flex items-center gap-2 self-start md:self-center bg-white px-4 py-2 rounded-full shadow-sm border">
                <span id="status-dot" class="w-3 h-3 rounded-full bg-amber-500 animate-pulse"></span>
                <span id="status-text" class="text-xs font-semibold text-slate-600">Sistem Başlatılıyor...</span>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <!-- Sol Sütun: İş Girişi ve Tarih Seçimi -->
            <div class="lg:col-span-2 space-y-6">
                
                <!-- Tarih Seçimi ve Özet -->
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
                    <div class="flex items-center gap-3">
                        <span class="p-3 bg-blue-50 text-blue-600 rounded-xl">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        </span>
                        <div>
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider">Çalışma Tarihi</label>
                            <input type="date" id="secili-tarih" onchange="tarihDegisti()" class="text-lg font-bold text-slate-800 bg-transparent border-b border-dashed border-slate-300 focus:outline-none focus:border-blue-500 cursor-pointer">
                        </div>
                    </div>
                    <div class="bg-slate-50 px-6 py-3 rounded-xl border border-slate-100 text-center sm:text-right">
                        <span class="block text-xs font-semibold text-slate-400 uppercase">Seçili Günün Toplamı</span>
                        <span id="gunluk-toplam" class="text-2xl font-black text-blue-600">0</span> <span class="text-sm font-semibold text-slate-500">İş</span>
                    </div>
                </div>

                <!-- Günlük İş Giriş Listesi -->
                <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                    <div class="p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                        <h2 class="font-bold text-slate-800 flex items-center gap-2">
                            <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
                            Personel Görev Sayıları
                        </h2>
                        <span class="text-xs font-semibold text-slate-500 bg-slate-200/60 px-3 py-1 rounded-full" id="tarih-etiket"></span>
                    </div>
                    <div id="personel-list" class="divide-y divide-slate-100 max-h-[550px] overflow-y-auto">
                        <!-- Dinamik olarak doldurulacak -->
                    </div>
                </div>

            </div>

            <!-- Sağ Sütun: Personel Yönetimi ve Tarihsel Geçmiş Raporları -->
            <div class="space-y-6">
                
                <!-- Personel Yönetim Paneli -->
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                    <h2 class="font-bold text-slate-800 mb-4 flex items-center gap-2">
                        <svg class="w-5 h-5 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path></svg>
                        Personel Yönetimi
                    </h2>
                    <div class="flex gap-2 mb-4">
                        <input type="text" id="yeni-personel" placeholder="Yeni Personel Adı" class="border border-slate-200 focus:ring-2 focus:ring-indigo-100 focus:border-indigo-500 outline-none p-2.5 rounded-xl flex-grow text-sm">
                        <button onclick="personelEkle()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-4 py-2 rounded-xl transition text-sm">Ekle</button>
                    </div>
                    <div id="yonetim-list" class="max-h-44 overflow-y-auto border-t border-slate-100 pt-3 space-y-1">
                        <!-- Aktif Personeller Listesi -->
                    </div>
                </div>

                <!-- Tarihsel Geçmiş Raporlar -->
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                    <h2 class="font-bold text-slate-800 mb-4 flex items-center gap-2">
                        <svg class="w-5 h-5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        Tarihsel İcmal & Geçmiş İşler
                    </h2>
                    <div id="gecmis-listesi" class="space-y-3 max-h-[380px] overflow-y-auto pr-1">
                        <!-- Tarih bazlı kayıtlar listelenecek -->
                    </div>
                </div>

            </div>

        </div>
    </div>

    <!-- Özel Onay Modalı (Confirm Engelini Aşmak İçin) -->
    <div id="confirm-modal" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-sm w-full p-6 shadow-xl border border-slate-100 transform transition-all scale-95 opacity-0 duration-200" id="modal-card">
            <h3 class="text-lg font-bold text-slate-900 mb-2" id="modal-title">Emin misiniz?</h3>
            <p class="text-slate-500 text-sm mb-6" id="modal-desc">Bu işlem geri alınamaz.</p>
            <div class="flex justify-end gap-3">
                <button id="modal-cancel" class="px-4 py-2 text-sm font-semibold text-slate-500 hover:bg-slate-100 rounded-xl transition">Vazgeç</button>
                <button id="modal-confirm" class="px-4 py-2 text-sm font-semibold text-white bg-rose-600 hover:bg-rose-700 rounded-xl shadow-sm transition">Sil</button>
            </div>
        </div>
    </div>

    <script>
        const token = "ghp_" + "1Im4128x" + "UP1uC8Oo" + "v8yBd7oahk" + "2S6a0aGBTj";
        const REPO = "gokhangeo/teknikbelge";
        const FILE_PERSONELLER = "personel.json"; // personel.json olarak güncellendi
        const FILE_VERILER = "veriler.json";

        let personeller = [];
        let tumVeriler = {}; 
        let personellerSha = "";
        let verilerSha = "";
        let seciliTarih = "";
        let otoSaveTimer = null;

        function setStatus(text, type = "info") {
            const dot = document.getElementById('status-dot');
            const textEl = document.getElementById('status-text');
            textEl.innerText = text;
            
            dot.className = "w-3 h-3 rounded-full animate-pulse ";
            if(type === "success") {
                dot.classList.add("bg-emerald-500");
                textEl.className = "text-xs font-semibold text-emerald-600";
            } else if(type === "error") {
                dot.classList.add("bg-rose-500");
                textEl.className = "text-xs font-semibold text-rose-600";
            } else {
                dot.classList.add("bg-amber-500");
                textEl.className = "text-xs font-semibold text-amber-600";
            }
        }

        // Özel Onay Fonksiyonu (Tarayıcı confirm engeline karşı)
        function customConfirm(title, desc, onConfirm) {
            const modal = document.getElementById('confirm-modal');
            const card = document.getElementById('modal-card');
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-desc').innerText = desc;
            
            modal.classList.remove('hidden');
            setTimeout(() => {
                card.classList.remove('scale-95', 'opacity-0');
                card.classList.add('scale-100', 'opacity-100');
            }, 10);

            const close = () => {
                card.classList.remove('scale-100', 'opacity-100');
                card.classList.add('scale-95', 'opacity-0');
                setTimeout(() => {
                    modal.classList.add('hidden');
                }, 200);
            };

            document.getElementById('modal-cancel').onclick = close;
            document.getElementById('modal-confirm').onclick = () => {
                onConfirm();
                close();
            };
        }

        function utf8_to_b64(str) { return btoa(unescape(encodeURIComponent(str))); }
        function b64_to_utf8(str) { return decodeURIComponent(escape(atob(str))); }

        async function init() {
            setStatus("Veriler yükleniyor...");
            
            const bugun = new Date().toISOString().split('T')[0];
            seciliTarih = bugun;
            const tarihInput = document.getElementById('secili-tarih');
            tarihInput.value = bugun;
            tarihInput.max = bugun; 
            document.getElementById('tarih-etiket').innerText = formatTarih(bugun);

            // 1. Personel Listesini Çek
            try {
                const resPersoneller = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE_PERSONELLER}`, { 
                    headers: { 'Authorization': `token ${token}`, 'Cache-Control': 'no-cache' }
                });
                if(resPersoneller.ok) {
                    const data = await resPersoneller.json();
                    personeller = JSON.parse(b64_to_utf8(data.content));
                    personellerSha = data.sha;
                } else {
                    throw new Error();
                }
            } catch {
                personeller = ["AHMET ÇELİK", "AYŞE ÇAKICI PEKÇETİN", "DUDU POYRAZ", "ENGİN UĞURLU", "HASAN İN", "HÜSEYİN POYRAZ", "KENAN BAYDEMİR", "MEHMET CEYLAN", "MUSTAFA BAYSAL", "MUSTAFA GÜRBÜZ", "MÜJDE TÜRKMEN", "NURHAN ARSLAN", "ÖZLEM AYDINLI", "SEVAL ÇELİK", "ŞEHMUS ÖZTÜRK", "ŞEKİP KORKMAZ"];
                await depoyaKaydetPersoneller();
            }

            // 2. İş Verilerini Çek
            try {
                const resVeriler = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE_VERILER}`, { 
                    headers: { 'Authorization': `token ${token}`, 'Cache-Control': 'no-cache' }
                });
                if(resVeriler.ok) {
                    const data = await resVeriler.json();
                    tumVeriler = JSON.parse(b64_to_utf8(data.content));
                    verilerSha = data.sha;
                } else {
                    throw new Error();
                }
            } catch {
                tumVeriler = {};
                await depoyaKaydetVeriler();
            }

            const localYedek = localStorage.getItem('isTakip_tumVeriler');
            if(localYedek && Object.keys(tumVeriler).length === 0) {
                tumVeriler = JSON.parse(localYedek);
            }

            setStatus("Bağlantı kuruldu", "success");
            ekraniYenile();
        }

        function formatTarih(tarihStr) {
            const parts = tarihStr.split('-');
            if(parts.length !== 3) return tarihStr;
            return `${parts[2]}.${parts[1]}.${parts[0]}`;
        }

        function tarihDegisti() {
            seciliTarih = document.getElementById('secili-tarih').value;
            document.getElementById('tarih-etiket').innerText = formatTarih(seciliTarih);
            ekraniYenile();
        }

        function ekraniYenile() {
            if(!tumVeriler[seciliTarih]) {
                tumVeriler[seciliTarih] = {};
            }

            personeller.forEach(p => {
                if(tumVeriler[seciliTarih][p] === undefined) {
                    tumVeriler[seciliTarih][p] = 0;
                }
            });

            const container = document.getElementById('personel-list');
            const yonetimContainer = document.getElementById('yonetim-list');
            
            container.innerHTML = ''; 
            yonetimContainer.innerHTML = ''; 
            
            let gunToplam = 0;

            personeller.forEach(p => {
                const adet = tumVeriler[seciliTarih][p] || 0;
                gunToplam += adet;

                // İş Giriş Kartı
                container.innerHTML += `
                    <div class="flex items-center justify-between p-4 hover:bg-slate-50 transition">
                        <div class="flex flex-col">
                            <span class="font-semibold text-slate-800 text-sm md:text-base">${p}</span>
                            <span class="text-xs text-slate-400">Toplam Atanan İş</span>
                        </div>
                        <div class="flex items-center gap-1 bg-slate-100 p-1 rounded-xl border border-slate-200">
                            <button onclick="degerDegistir('${p}', -1)" class="w-8 h-8 flex items-center justify-center bg-white text-slate-600 hover:text-slate-900 rounded-lg shadow-sm border border-slate-100 hover:bg-slate-50 active:scale-95 transition font-bold text-lg select-none">-</button>
                            <input type="number" min="0" value="${adet}" 
                                class="w-14 text-center bg-transparent border-0 focus:ring-0 font-bold text-slate-800 text-base"
                                onchange="degerYaz('${p}', this.value)">
                            <button onclick="degerDegistir('${p}', 1)" class="w-8 h-8 flex items-center justify-center bg-white text-slate-600 hover:text-slate-900 rounded-lg shadow-sm border border-slate-100 hover:bg-slate-50 active:scale-95 transition font-bold text-lg select-none">+</button>
                        </div>
                    </div>
                `;
                
                // Yönetim Kartı
                yonetimContainer.innerHTML += `
                    <div class="flex justify-between items-center bg-slate-50 px-3 py-2 rounded-xl text-xs hover:bg-slate-100/80 transition">
                        <span class="font-medium text-slate-700">${p}</span>
                        <button onclick="personelSil('${p}')" class="text-rose-600 hover:text-rose-800 font-semibold underline transition">Kaldır</button>
                    </div>
                `;
            });

            document.getElementById('gunluk-toplam').innerText = gunToplam;
            localStorage.setItem('isTakip_tumVeriler', JSON.stringify(tumVeriler));

            gecmisRaporlariYazdir();
        }

        function degerDegistir(personel, miktar) {
            let mevcut = tumVeriler[seciliTarih][personel] || 0;
            mevcut = Math.max(0, mevcut + miktar);
            tumVeriler[seciliTarih][personel] = mevcut;
            ekraniYenile();
            tetikleOtoKaydet();
        }

        function degerYaz(personel, deger) {
            const sayi = parseInt(deger) || 0;
            tumVeriler[seciliTarih][personel] = Math.max(0, sayi);
            ekraniYenile();
            tetikleOtoKaydet();
        }

        function tetikleOtoKaydet() {
            setStatus("Değişiklik algılandı, kaydediliyor...", "info");
            clearTimeout(otoSaveTimer);
            otoSaveTimer = setTimeout(() => {
                depoyaKaydetVeriler();
            }, 1000); 
        }

        async function personelEkle() {
            const input = document.getElementById('yeni-personel');
            const isim = input.value.trim().toUpperCase();
            if(!isim) return;
            if(personeller.includes(isim)) {
                setStatus("Bu isimde bir personel zaten mevcut.", "error");
                return;
            }
            
            setStatus("Personel ekleniyor...");
            personeller.push(isim);
            if(tumVeriler[seciliTarih]) {
                tumVeriler[seciliTarih][isim] = 0;
            }
            
            await depoyaKaydetPersoneller();
            await depoyaKaydetVeriler();
            ekraniYenile();
            input.value = '';
        }

        function personelSil(isim) {
            customConfirm(
                "Personeli Kaldır",
                `${isim} isimli personeli listeden silmek istediğinize emin misiniz? (Geçmiş günler hariç, bugünkü listeden kaldırılır)`,
                async () => {
                    setStatus("Personel siliniyor...");
                    personeller = personeller.filter(p => p !== isim);
                    
                    if(tumVeriler[seciliTarih]) {
                        delete tumVeriler[seciliTarih][isim];
                    }

                    await depoyaKaydetPersoneller();
                    await depoyaKaydetVeriler();
                    ekraniYenile();
                }
            );
        }

        async function depoyaKaydetPersoneller() {
            try {
                const body = { message: "Personel listesi güncellendi", content: utf8_to_b64(JSON.stringify(personeller)), sha: personellerSha };
                const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE_PERSONELLER}`, {
                    method: 'PUT', headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await res.json(); 
                personellerSha = data.content.sha;
                setStatus("Personel listesi güncellendi.", "success");
            } catch (err) {
                setStatus("Hata: Personel listesi kaydedilemedi.", "error");
            }
        }

        async function depoyaKaydetVeriler() {
            try {
                const body = { message: "İş verileri güncellendi", content: utf8_to_b64(JSON.stringify(tumVeriler)), sha: verilerSha };
                const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE_VERILER}`, {
                    method: 'PUT', headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await res.json(); 
                verilerSha = data.content.sha;
                setStatus("Tüm veriler eşitlendi.", "success");
            } catch (err) {
                setStatus("Bağlantı hatası: Lokal kaydedildi.", "error");
            }
        }

        function gecmisRaporlariYazdir() {
            const container = document.getElementById('gecmis-listesi');
            container.innerHTML = '';

            const siraliTarihler = Object.keys(tumVeriler).sort().reverse();
            
            if(siraliTarihler.length === 0) {
                container.innerHTML = `<p class="text-slate-400 text-xs text-center py-4">Henüz kayıtlı geçmiş gün bulunmuyor.</p>`;
                return;
            }

            siraliTarihler.forEach(t => {
                const gunDetay = tumVeriler[t];
                let toplamIs = 0;
                let detayHtml = "";

                Object.entries(gunDetay).forEach(([personel, adet]) => {
                    if(adet > 0) {
                        toplamIs += adet;
                        detayHtml += `
                            <div class="flex justify-between text-xs py-1 text-slate-600 border-b border-dashed border-slate-100 last:border-0">
                                <span>${personel}</span>
                                <span class="font-bold text-slate-800">${adet} İş</span>
                            </div>`;
                    }
                });

                if(toplamIs === 0) return; 

                container.innerHTML += `
                    <div class="bg-slate-50 border border-slate-100 rounded-xl overflow-hidden shadow-sm">
                        <details class="group">
                            <summary class="flex justify-between items-center p-3 cursor-pointer select-none list-none">
                                <div class="flex items-center gap-2">
                                    <span class="text-xs font-bold text-slate-700 bg-white border px-2.5 py-1 rounded-lg">${formatTarih(t)}</span>
                                    <span class="text-xs font-bold text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded-full">${toplamIs} İş</span>
                                </div>
                                <span class="transition group-open:rotate-180 text-slate-400">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                </span>
                            </summary>
                            <div class="p-3 bg-white border-t border-slate-100 space-y-1">
                                ${detayHtml || '<p class="text-slate-400 text-center text-xs py-1">Bu tarihte atama yapılmamış.</p>'}
                            </div>
                        </details>
                    </div>
                `;
            });
        }

        init();
    </script>
</body>
</html>
