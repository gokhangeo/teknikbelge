<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLAN ÖRNEĞİ VE TEKNİK BELGE TALEPLERİ GÖREVLENDİRME</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* Sayı inputlarındaki okları gizlemek için */
        .hide-arrows::-webkit-outer-spin-button,
        .hide-arrows::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .hide-arrows[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">

    <div class="max-w-6xl mx-auto p-4 md:p-6">
        <header class="mb-8 flex flex-col md:flex-row md:items-center md:justify-between gap-4 border-b pb-6">
            <div>
                <h1 class="text-2xl md:text-3xl font-extrabold text-slate-900 tracking-tight">PLAN ÖRNEĞİ VE TEKNİK BELGE TALEPLERİ</h1>
                <p class="text-slate-500 mt-1">Personel görev ve parsel takip paneli</p>
            </div>
            <div class="flex items-center gap-2 bg-white px-4 py-2 rounded-full shadow-sm border">
                <span id="status-dot" class="w-3 h-3 rounded-full bg-amber-500 animate-pulse"></span>
                <span id="status-text" class="text-xs font-semibold text-slate-600">Başlatılıyor...</span>
                <button id="btn-reconnect" onclick="init()" class="hidden text-xs text-blue-600 hover:text-blue-800 font-bold ml-2 underline">Yeniden Dene</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                    <input type="date" id="secili-tarih" onchange="tarihDegisti()" class="text-lg font-bold border-b border-dashed border-slate-300 focus:outline-none bg-transparent cursor-pointer">
                    <div class="text-left sm:text-right flex flex-wrap items-center gap-2 sm:gap-4 justify-start sm:justify-end">
                        <div>
                            <span class="block text-xs font-semibold text-slate-400">GÜNLÜK TOPLAM İŞ</span>
                            <span id="gunluk-toplam-is" class="text-3xl font-black text-blue-600">0</span>
                        </div>
                        <div class="h-8 w-px bg-slate-200 hidden sm:block"></div>
                        <div>
                            <span class="block text-xs font-semibold text-slate-400">GÜNLÜK TOPLAM PARSEL</span>
                            <span id="gunluk-toplam-parsel" class="text-3xl font-black text-emerald-600">0</span>
                        </div>
                    </div>
                </div>
                <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                    <div class="p-4 bg-slate-50 border-b border-slate-100 font-bold text-slate-700">Personel İş ve Parsel Sayıları</div>
                    <div id="personel-list" class="divide-y divide-slate-100 max-h-[600px] overflow-y-auto"></div>
                </div>
            </div>

            <div class="space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border">
                    <h2 class="font-bold mb-4">Personel Yönetimi</h2>
                    <div class="flex gap-2 mb-4">
                        <input type="text" id="yeni-personel" placeholder="İsim Girin" class="border border-slate-200 focus:ring-2 focus:ring-indigo-100 outline-none p-2 rounded-xl flex-grow text-sm">
                        <button onclick="personelEkle()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium px-4 py-2 rounded-xl text-sm transition">Ekle</button>
                    </div>
                    <div id="yonetim-list" class="space-y-1 max-h-60 overflow-y-auto"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const token = "ghp_" + "1Im4128x" + "UP1uC8Oo" + "v8yBd7oahk" + "2S6a0aGBTj";
        const REPO = "gokhangeo/teknikbelge";
        const FILE_PERSONELLER = "personel.json";
        const FILE_VERILER = "veriler.json";

        let personeller = [];
        let tumVeriler = {};
        
        const bugun = new Date().toISOString().split('T')[0];
        let seciliTarih = bugun;
        document.getElementById('secili-tarih').value = bugun;

        async function init() {
            document.getElementById('status-text').innerText = "GitHub'a bağlanılıyor...";
            document.getElementById('status-dot').className = "w-3 h-3 rounded-full bg-amber-500 animate-pulse";
            document.getElementById('btn-reconnect').classList.add('hidden');
            
            try {
                const headers = { 
                    'Authorization': `token ${token}`, 
                    'Accept': 'application/vnd.github.v3+json'
                };

                const resPersonel = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE_PERSONELLER}`, { headers });
                if (!resPersonel.ok) throw new Error("Personel yetki veya bağlantı hatası.");
                const dataP = await resPersonel.json();
                const contentP = JSON.parse(decodeURIComponent(escape(atob(dataP.content.replace(/\s/g, '')))));
                personeller = Array.isArray(contentP) ? contentP : (contentP.personeller || []);
                localStorage.setItem('isTakip_personeller', JSON.stringify(personeller));

                const resVeriler = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE_VERILER}`, { headers });
                if (resVeriler.ok) {
                    const dataV = await resVeriler.json();
                    tumVeriler = JSON.parse(decodeURIComponent(escape(atob(dataV.content.replace(/\s/g, '')))));
                    localStorage.setItem('isTakip_tumVeriler', JSON.stringify(tumVeriler));
                }

                document.getElementById('status-text').innerText = "Bağlantı Kuruldu";
                document.getElementById('status-dot').className = "w-3 h-3 rounded-full bg-emerald-500";
                
            } catch (e) {
                console.warn("GitHub ile senkronize olunamadı. Yerel veriler kullanılıyor.");
                
                personeller = JSON.parse(localStorage.getItem('isTakip_personeller')) || [];
                tumVeriler = JSON.parse(localStorage.getItem('isTakip_tumVeriler')) || {};
                
                document.getElementById('status-text').innerText = "Yerel Mod (Çevrimdışı)";
                document.getElementById('status-dot').className = "w-3 h-3 rounded-full bg-rose-500";
                document.getElementById('btn-reconnect').classList.remove('hidden');
            }
            ekraniYenile();
        }

        async function githubaKaydet(dosya, icerik) {
            try {
                // Kayıtların üst üste binip hata vermesini engellemek için zaman etiketi (t) eklendi
                const resGet = await fetch(`https://api.github.com/repos/${REPO}/contents/${dosya}?t=${new Date().getTime()}`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                let sha = undefined;
                if(resGet.ok) {
                    const data = await resGet.json();
                    sha = data.sha;
                }

                await fetch(`https://api.github.com/repos/${REPO}/contents/${dosya}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: "Sistem güncellemesi", 
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(icerik)))),
                        sha: sha 
                    })
                });
            } catch (e) {
                console.warn("Kayıt işlemi GitHub'a gönderilemedi. Tarayıcıya kaydedildi.");
            }
        }

        // Artırma/azaltma tuşları için
        function degerDegistir(personel, tip, miktar) {
            let data = tumVeriler[seciliTarih]?.[personel];
            let mevcut = 0;
            
            // Eski sayısal verilerle uyumluluk
            if (typeof data === 'number') {
                mevcut = tip === 'is' ? data : 0;
            } else if (data) {
                mevcut = data[tip] || 0;
            }
            
            degerBelirle(personel, tip, mevcut + miktar);
        }

        // Elle değer girildiğinde veya değiştirildiğinde çalışır
        function degerBelirle(personel, tip, yeniDeger) {
            yeniDeger = parseInt(yeniDeger) || 0;
            if(yeniDeger < 0) yeniDeger = 0;

            if (!tumVeriler[seciliTarih]) tumVeriler[seciliTarih] = {};
            
            // Eski veriler (sadece sayı) varsa yeni obje formatına dönüştür
            if (typeof tumVeriler[seciliTarih][personel] === 'number') {
                tumVeriler[seciliTarih][personel] = { 
                    is: tumVeriler[seciliTarih][personel], 
                    parsel: 0 
                };
            }
            
            // Veri hiç yoksa sıfırdan oluştur
            if (!tumVeriler[seciliTarih][personel]) {
                tumVeriler[seciliTarih][personel] = { is: 0, parsel: 0 };
            }

            tumVeriler[seciliTarih][personel][tip] = yeniDeger;
            
            localStorage.setItem('isTakip_tumVeriler', JSON.stringify(tumVeriler));
            ekraniYenile();
            githubaKaydet(FILE_VERILER, tumVeriler);
        }

        async function personelSil(isim) {
            if(!confirm(`${isim} isimli personeli silmek istiyor musunuz?`)) return;
            
            personeller = personeller.filter(p => p !== isim);
            localStorage.setItem('isTakip_personeller', JSON.stringify(personeller));
            ekraniYenile();
            githubaKaydet(FILE_PERSONELLER, personeller);
        }

        function personelEkle() {
            const val = document.getElementById('yeni-personel').value.trim().toUpperCase();
            if(val && !personeller.includes(val)) {
                personeller.push(val);
                localStorage.setItem('isTakip_personeller', JSON.stringify(personeller));
                document.getElementById('yeni-personel').value = '';
                ekraniYenile();
                githubaKaydet(FILE_PERSONELLER, personeller);
            }
        }

        function ekraniYenile() {
            const container = document.getElementById('personel-list');
            const yonetim = document.getElementById('yonetim-list');
            container.innerHTML = ''; yonetim.innerHTML = '';

            let gunToplamIs = 0;
            let gunToplamParsel = 0;
            if (!tumVeriler[seciliTarih]) tumVeriler[seciliTarih] = {};

            let genelToplamlar = {};
            personeller.forEach(p => genelToplamlar[p] = { is: 0, parsel: 0 });
            
            Object.values(tumVeriler).forEach(gunluk => {
                Object.entries(gunluk).forEach(([kisi, data]) => {
                    if (genelToplamlar[kisi] !== undefined) {
                        let isAdet = typeof data === 'number' ? data : (data?.is || 0);
                        let parselAdet = typeof data === 'number' ? 0 : (data?.parsel || 0);
                        
                        genelToplamlar[kisi].is += isAdet;
                        genelToplamlar[kisi].parsel += parselAdet;
                    }
                });
            });

            personeller.forEach(p => {
                let pData = tumVeriler[seciliTarih][p];
                let isAdet = typeof pData === 'number' ? pData : (pData?.is || 0);
                let parselAdet = typeof pData === 'number' ? 0 : (pData?.parsel || 0);

                gunToplamIs += isAdet;
                gunToplamParsel += parselAdet;
                
                let genelIsAdet = genelToplamlar[p].is;
                let genelParselAdet = genelToplamlar[p].parsel;

                container.innerHTML += `
                    <div class="p-4 flex flex-col md:flex-row justify-between items-start md:items-center hover:bg-slate-100 transition duration-150 gap-4">
                        <div class="flex flex-col">
                            <span class="font-medium text-slate-700">${p}</span>
                            <span class="text-xs text-slate-500 font-semibold mt-0.5">Tüm Zamanlar: <span class="text-indigo-600">${genelIsAdet} İş</span>, <span class="text-emerald-600">${genelParselAdet} Parsel</span></span>
                        </div>
                        <div class="flex flex-wrap items-center gap-6">
                            <!-- İş Sayacı -->
                            <div class="flex items-center gap-2 bg-slate-50 border p-1.5 rounded-xl">
                                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider w-8 text-center">İş</span>
                                <button onclick="degerDegistir('${p}', 'is', -1)" class="w-7 h-7 flex items-center justify-center bg-white text-slate-600 rounded-lg hover:bg-slate-200 font-bold transition shadow-sm border">-</button>
                                <input type="number" min="0" onchange="degerBelirle('${p}', 'is', this.value)" onclick="this.select()" value="${isAdet}" class="w-12 text-center font-bold text-lg text-blue-600 bg-transparent outline-none focus:bg-white rounded hide-arrows">
                                <button onclick="degerDegistir('${p}', 'is', 1)" class="w-7 h-7 flex items-center justify-center bg-blue-100 text-blue-700 rounded-lg hover:bg-blue-200 font-bold transition shadow-sm">+</button>
                            </div>
                            
                            <!-- Parsel Sayacı -->
                            <div class="flex items-center gap-2 bg-slate-50 border p-1.5 rounded-xl">
                                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider w-12 text-center">Parsel</span>
                                <button onclick="degerDegistir('${p}', 'parsel', -1)" class="w-7 h-7 flex items-center justify-center bg-white text-slate-600 rounded-lg hover:bg-slate-200 font-bold transition shadow-sm border">-</button>
                                <input type="number" min="0" onchange="degerBelirle('${p}', 'parsel', this.value)" onclick="this.select()" value="${parselAdet}" class="w-12 text-center font-bold text-lg text-emerald-600 bg-transparent outline-none focus:bg-white rounded hide-arrows">
                                <button onclick="degerDegistir('${p}', 'parsel', 1)" class="w-7 h-7 flex items-center justify-center bg-emerald-100 text-emerald-700 rounded-lg hover:bg-emerald-200 font-bold transition shadow-sm">+</button>
                            </div>
                        </div>
                    </div>`;
                
                yonetim.innerHTML += `
                    <div class="flex justify-between items-center text-xs py-2 px-3 bg-slate-50 border border-slate-100 rounded-lg mb-1">
                        <div class="flex flex-col">
                            <span class="font-semibold text-slate-600">${p}</span>
                            <span class="text-slate-400 mt-0.5">Toplam: ${genelIsAdet} İş, ${genelParselAdet} Parsel</span>
                        </div>
                        <button onclick="personelSil('${p}')" class="text-rose-500 font-bold hover:underline">Sil</button>
                    </div>`;
            });

            document.getElementById('gunluk-toplam-is').innerText = gunToplamIs;
            document.getElementById('gunluk-toplam-parsel').innerText = gunToplamParsel;
        }

        function tarihDegisti() {
            seciliTarih = document.getElementById('secili-tarih').value;
            ekraniYenile();
        }

        init();
    </script>
</body>
</html>
